server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_URL}/${POSTGRES_DB_NAME}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: db/migration/db.changelog-master.yaml

jwt:
  secretKey: ${JWT_SECRET}
  expiration: 3600000 # 1 hour expiration rate

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
  allowed-headers:
    - "*"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow-credentials: true

logging:
  level:
    root: info
    com.example: debug
    com.example.bankcards: trace

encryption:
  secret-key: ${CARD_NUMBER_CIPHER_KEY}