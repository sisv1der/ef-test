server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_URL:127.0.0.1}/${POSTGRES_DB_NAME:bankrestdb}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: db/migration/db.changelog-master.yaml

jwt:
  secretKey: ${JWT_SECRET:sN7v8FzQy0K+7R5GvB9hQ2Lk3v8xJ9Yp2U1rM4Q8t6U=}
  expiration: 3600000 # 1 hour expiration rate

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
  allowed-headers:
    - "*"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow-credentials: true

logging:
  level:
    root: info
    com.example: debug
    com.example.bankcards: debug

encryption:
  secret-key: ${CARD_NUMBER_CIPHER_KEY:sN7v8FzQy0K+7R5GvB9hQ2Lk3v8xJ9Yp2U1rM4Q8t6U=}