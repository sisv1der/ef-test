databaseChangeLog:
  - changeSet:
      id: 002-initial-schema
      author: Ivan-Yarigo
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: role
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: is_active
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValue: "true"
        - createIndex:
            indexName: idx_active_users_role
            tableName: users
            columns:
              - column:
                  name: role
              - column:
                  name: is_active

        - createIndex:
            indexName: idx_users_created_at
            tableName: users
            columns:
              - column:
                  name: created_at

        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: owner_name
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_number
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: salt
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: iv
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: numeric(12, 2)
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0.00
              - column:
                  name: status
                  type: card_status
                  constraints:
                    nullable: false
                  defaultValue: 'ACTIVE'
              - column:
                  name: expiration_date
                  type: timestamptz
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: owner_user_id
            constraintName: fk_cards_users
            referencedTableName: users
            referencedColumnNames: id
            onDelete: cascade

        - createIndex:
            indexName: idx_cards_owner_user_id
            tableName: cards
            columns:
              - column:
                  name: owner_user_id

        - createIndex:
            indexName: idx_cards_owner_status
            tableName: cards
            columns:
              - column:
                  name: owner_user_id
              - column:
                  name: status